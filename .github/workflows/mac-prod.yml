name: "Production: macOS Desktop Build"

on:
  push:
    branches:
      - 'release-v*.*.*'

permissions:
  id-token: write
  contents: read

env:
  GCS_BUCKET: ${{ secrets.PROD_DESKTOP_ARTIFACTS_BUCKET }}

jobs:
  build:
    name: Package macOS DMG (Production)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Write secrets to local.properties (production)
        run: |
          cat >> local.properties <<EOF
          signaling.auth.token=${{ secrets.SIGNALING_AUTH_TOKEN_PROD }}
          signaling.server.url=${{ secrets.SIGNALING_SERVER_WSS_URL_PROD }}
          turn.urls=${{ secrets.SHAREX_TURN_URLS_PROD }}
          turn.username=${{ secrets.SHAREX_TURN_USERNAME_PROD }}
          turn.credential=${{ secrets.SHAREX_TURN_CREDENTIAL_PROD }}
          EOF

      - name: Build macOS App Bundle
        run: ./gradlew :composeApp:createDistributable

      - name: Install Apple Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_QA }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD_QA }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/mac-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

          echo "$APPLE_CERTIFICATE" | base64 --decode -o $RUNNER_TEMP/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 \
            -k $KEYCHAIN_PATH \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH \
            $(security list-keychains -d user | tr -d '"')

      - name: Sign macOS App
        run: |
          APP_PATH=$(find composeApp/build/compose/binaries/main/app -name "*.app" | head -1)
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Signing with identity: $SIGNING_IDENTITY"

          # Gradle sets output dirs read-only after createDistributable; make writable for signing
          chmod -R u+w "$APP_PATH"

          # Apple scans inside JARs — extract, sign, repack each JAR that contains Mac native libs
          echo "--- Signing native libs inside JARs ---"
          find "$APP_PATH/Contents/app" -name "*.jar" | while read JAR; do
            if unzip -l "$JAR" 2>/dev/null | grep -qE '(macosx|darwin)-(arm64|x86_64|aarch64)/|\.(dylib|jnilib)$'; then
              echo "Processing: $(basename "$JAR")"
              JARTEMP=$(mktemp -d)
              unzip -q "$JAR" -d "$JARTEMP"
              find "$JARTEMP" \( -path "*/Mac/x86/*.jnilib" -o -path "*/Mac/x86/*.dylib" \) \
                -not -path "*/Mac/x86_64/*" -delete 2>/dev/null || true
              find "$JARTEMP" -type f | while read LIB; do
                if file "$LIB" 2>/dev/null | grep -q "Mach-O"; then
                  codesign --force --options=runtime --timestamp --sign "$SIGNING_IDENTITY" "$LIB"
                fi
              done
              find "$JARTEMP/META-INF" \( -name "*.SF" -o -name "*.RSA" -o -name "*.DSA" \) -delete 2>/dev/null || true
              NEWJAR=$(mktemp)
              jar cf "$NEWJAR" -C "$JARTEMP" .
              mv -f "$NEWJAR" "$JAR"
              rm -rf "$JARTEMP"
            fi
          done

          # Sign all dylibs/jnilibs/helper executables directly in the bundle
          echo "--- Signing bundle dylibs ---"
          find "$APP_PATH" \( -name "*.dylib" -o -name "*.jnilib" -o -name "jspawnhelper" \) -exec \
            codesign --force --options=runtime --timestamp \
              --sign "$SIGNING_IDENTITY" {} \;

          # Sign the outer app bundle last
          echo "--- Signing app bundle ---"
          codesign --deep --force --options=runtime --timestamp \
            --entitlements composeApp/src/jvmMain/resources/macos.entitlements \
            --sign "$SIGNING_IDENTITY" \
            "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
          echo "Signing verified"

      - name: Create DMG from signed app
        run: |
          APP_PATH=$(find composeApp/build/compose/binaries/main/app -name "*.app" | head -1)
          APP_NAME=$(basename "$APP_PATH" .app)
          mkdir -p composeApp/build/compose/binaries/main/dmg
          STAGING=$(mktemp -d)
          cp -r "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "composeApp/build/compose/binaries/main/dmg/${APP_NAME}-1.0.0.dmg"
          rm -rf "$STAGING"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_FILE=$(ls composeApp/build/compose/binaries/main/dmg/*.dmg | head -1)

          SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG_FILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait --timeout 30m 2>&1)
          echo "$SUBMIT_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "^  id:" | head -1 | awk '{print $2}')

          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            echo "--- Notarization rejected — fetching Apple log ---"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_PASSWORD"
            exit 1
          fi

          xcrun stapler staple "$DMG_FILE"
          echo "Notarization and stapling complete"

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/mac-signing.keychain-db || true

      - name: Google Authentication
        uses: Teachmint/hanuman/.github/actions/gcp-auth@main
        with:
          wif_pool: ${{ secrets.PROD_WIF_POOL }}
          service_account: ${{ secrets.PROD_BUCKET_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.PROD_GCP_PROJECT_ID }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload DMG to GCS
        id: upload_gcs
        run: |
          DMG_FILE=$(ls composeApp/build/compose/binaries/main/dmg/*.dmg | head -1)
          FILENAME=$(basename "$DMG_FILE")
          ENCODED_FILENAME="${FILENAME// /%20}"
          gsutil cp "$DMG_FILE" "gs://${{ env.GCS_BUCKET }}/mac/${FILENAME}"
          echo "download_url=https://storage.googleapis.com/${{ env.GCS_BUCKET }}/mac/${ENCODED_FILENAME}" >> $GITHUB_OUTPUT

      - name: Update drishya_darwin_latest.json
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#release-}"
          jq -n --arg ver "$VERSION" --arg url "${{ steps.upload_gcs.outputs.download_url }}" \
            '{"version": $ver, "notes": "", "url": $url}' \
            | gsutil -h "Content-Type:application/json" cp - "gs://${{ env.GCS_BUCKET }}/drishya_darwin_latest.json"

      - name: Google Chat Notification Action
        if: always()
        uses: SimonScholz/google-chat-action@v1.1.0
        with:
          webhookUrl: ${{ secrets.GCHAT_NOTIFICATION }}
          jobStatus: ${{ job.status }}
          title: "macOS Desktop Build (PRODUCTION)"
          subtitle: 'Triggered by: ${{ github.triggering_actor }}'
          imageUrl: https://storage.googleapis.com/tm-assets/images/dark/teachmint-collapse-logo.svg
          additionalSections: '[
            {
                "header": "Deployment Details",
                "collapsible": false,
                "widgets": [
                    {
                        "decoratedText": {
                            "startIcon": {
                                "knownIcon": "STAR"
                            },
                            "text": "<b>Branch:</b> ${{ github.ref_name }}<br><b>Download DMG:</b> <a href=\"${{ steps.upload_gcs.outputs.download_url }}\">Download from GCS</a>",
                            "wrapText": true
                        }
                    },
                    {
                        "decoratedText": {
                            "startIcon": {
                                "knownIcon": "STAR"
                            },
                            "text": "<b>Build Run:</b> <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Workflow Run</a>",
                            "wrapText": true
                        }
                    }
                ]
            }
          ]'
