name: "Production: Windows Desktop Build"

on:
  push:
    branches:
      - 'release-v*.*.*'

permissions:
  id-token: write
  contents: read

env:
  GCS_BUCKET: ${{ secrets.PROD_DESKTOP_ARTIFACTS_BUCKET }}

jobs:
  build:
    name: Package Windows EXE (Production)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Write secrets to local.properties (production)
        shell: bash
        run: |
          cat >> local.properties <<EOF
          signaling.auth.token=${{ secrets.SIGNALING_AUTH_TOKEN_PROD }}
          signaling.server.url=${{ secrets.SIGNALING_SERVER_WSS_URL_PROD }}
          turn.urls=${{ secrets.SHAREX_TURN_URLS_PROD }}
          turn.username=${{ secrets.SHAREX_TURN_USERNAME_PROD }}
          turn.credential=${{ secrets.SHAREX_TURN_CREDENTIAL_PROD }}
          EOF

      - name: Package EXE (Windows Desktop)
        run: .\gradlew.bat :composeApp:packageExe

      - name: Google Authentication
        uses: Teachmint/hanuman/.github/actions/gcp-auth@main
        with:
          wif_pool: ${{ secrets.PROD_WIF_POOL }}
          service_account: ${{ secrets.PROD_BUCKET_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.PROD_GCP_PROJECT_ID }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload EXE to GCS
        id: upload_gcs
        shell: bash
        run: |
          EXE_FILE=$(ls composeApp/build/compose/binaries/main/exe/*.exe | head -1)
          FILENAME=$(basename "$EXE_FILE")
          ENCODED_FILENAME="${FILENAME// /%20}"
          gsutil cp "$EXE_FILE" "gs://${{ env.GCS_BUCKET }}/windows/${FILENAME}"
          echo "download_url=https://storage.googleapis.com/${{ env.GCS_BUCKET }}/windows/${ENCODED_FILENAME}" >> $GITHUB_OUTPUT

      - name: Update drishya_windows_latest.json
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#release-}"
          jq -n --arg ver "$VERSION" --arg url "${{ steps.upload_gcs.outputs.download_url }}" \
            '{"version": $ver, "notes": "", "url": $url}' \
            | gsutil -h "Content-Type:application/json" cp - "gs://${{ env.GCS_BUCKET }}/drishya_windows_latest.json"

      - name: Google Chat Notification Action
        if: always()
        uses: SimonScholz/google-chat-action@v1.1.0
        with:
          webhookUrl: ${{ secrets.GCHAT_NOTIFICATION }}
          jobStatus: ${{ job.status }}
          title: "Windows Desktop Build (PRODUCTION)"
          subtitle: 'Triggered by: ${{ github.triggering_actor }}'
          imageUrl: https://storage.googleapis.com/tm-assets/images/dark/teachmint-collapse-logo.svg
          additionalSections: '[
            {
                "header": "Deployment Details",
                "collapsible": false,
                "widgets": [
                    {
                        "decoratedText": {
                            "startIcon": {
                                "knownIcon": "STAR"
                            },
                            "text": "<b>Branch:</b> ${{ steps.upload_gcs.outputs.branch }}<br><b>Download EXE:</b> <a href=\"${{ steps.upload_gcs.outputs.download_url }}\">Download from GCS</a>",
                            "wrapText": true
                        }
                    },
                    {
                        "decoratedText": {
                            "startIcon": {
                                "knownIcon": "STAR"
                            },
                            "text": "<b>Build Run:</b> <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Workflow Run</a>",
                            "wrapText": true
                        }
                    }
                ]
            }
          ]'
