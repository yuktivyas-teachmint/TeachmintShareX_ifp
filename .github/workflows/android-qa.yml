name: "QA: Android Firebase Distribution"

on:
  workflow_dispatch:


jobs:
  build:
    name: Build & Deploy Android (QA)
    runs-on: [Android-test-runner]
    env:
      CI: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Create google-services.json
        run: |
          cat <<EOF > androidApp/google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON_DEBUG }}
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true

      - name: Clear build caches (self-hosted runner)
        run: |
          rm -rf .gradle/build-cache .gradle/caches/build-cache-*
          rm -rf composeApp/build androidApp/build
          ./gradlew --stop 2>/dev/null || true

      - name: Write secrets to local.properties
        run: |
          cat >> local.properties <<EOF
          signaling.auth.token=${{ secrets.SIGNALING_AUTH_TOKEN }}
          signaling.server.url=${{ secrets.SIGNALING_SERVER_WSS_URL }}
          turn.urls=${{ secrets.SHAREX_TURN_URLS }}
          turn.username=${{ secrets.SHAREX_TURN_USERNAME }}
          turn.credential=${{ secrets.SHAREX_TURN_CREDENTIAL }}
          EOF

      - name: Build Debug APK
        run: ./gradlew clean :androidApp:assembleDebug --no-build-cache --no-daemon

      - name: Get Build Tools Version
        run: |
          BUILD_TOOLS_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | sort -n | tail -1)
          echo "BUILD_TOOLS=$BUILD_TOOLS_VERSION" >> $GITHUB_ENV
          echo "Using Build Tools version: $BUILD_TOOLS_VERSION"

      - name: Upload artifact to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1.7.1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_DEBUG }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_APP_DIST_CRED_DEBUG }}
          groups: QA
          file: androidApp/build/outputs/apk/debug/androidApp-debug.apk

      - name: Google Chat Notification Action
        if: always()
        uses: SimonScholz/google-chat-action@v1.1.0
        with:
          webhookUrl: ${{ secrets.GCHAT_NOTIFICATION }}
          jobStatus: ${{ job.status }}
          title: "Android Build & Deploy (QA)"
          subtitle: 'Triggered by: ${{ github.triggering_actor }}'
          imageUrl: https://storage.googleapis.com/tm-assets/images/dark/teachmint-collapse-logo.svg         
          additionalSections: '[
            {
                "header": "Deployment Details", 
                "collapsible": false, 
                "widgets": [
                    {
                        "decoratedText": {
                            "startIcon": {
                                "knownIcon": "STAR"
                            },
                            "text": "<b>Package:</b> com.teachmint.shareX.debug<br><b>Branch:</b> ${{ github.ref_name }}<br><b>Run:</b> ${{ github.run_number }}",
                            "wrapText": true
                        }        
                    },
                    {
                        "decoratedText": {
                            "startIcon": {
                                "knownIcon": "STAR"
                            },
                            "text": "<b>Build Run:</b> <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Workflow Run</a>",
                            "wrapText": true
                        }        
                    }                                          
                ]
            }
          ]'
